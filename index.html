<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Posture Pulse - 자세 교정</title>
    <meta name="theme-color" content="#0f1b2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Public+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg-deep: #0f1b2e;
        --bg-mid: #1b2f4a;
        --bg-glow: #f4efe7;
        --surface: #ffffff;
        --surface-2: #f3f6f9;
        --ink-strong: #0f172a;
        --ink: #1f2937;
        --ink-soft: #667085;
        --accent: #ff7a45;
        --accent-strong: #ef5a1a;
        --teal: #19a79b;
        --warning: #d1495b;
        --shadow: 0 20px 45px rgba(15, 23, 42, 0.18);
        --radius-xl: 28px;
        --radius-lg: 20px;
        --radius-md: 14px;
        --radius-sm: 10px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Public Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.4), transparent 45%),
          radial-gradient(circle at 70% 15%, rgba(255, 122, 69, 0.25), transparent 40%),
          linear-gradient(135deg, var(--bg-deep), var(--bg-mid));
        display: flex;
        justify-content: center;
        align-items: stretch;
        padding: 48px 20px 60px;
      }

      .app {
        width: min(1120px, 100%);
        display: grid;
        grid-template-columns: minmax(260px, 1fr) minmax(280px, 1.1fr);
        gap: 28px;
      }

      .hero {
        color: #f8fafc;
        padding: 8px 4px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .hero h1 {
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        font-size: clamp(2.1rem, 2.8vw, 3.3rem);
        margin: 0;
        letter-spacing: -0.02em;
      }

      .hero p {
        margin: 0;
        font-size: 1.05rem;
        color: rgba(248, 250, 252, 0.82);
        line-height: 1.6;
      }

      .hero ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }

      .hero li {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 12px 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        font-size: 0.98rem;
      }

      .hero li span {
        font-weight: 600;
      }

      .panel {
        background: var(--surface);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        padding: 28px;
        display: grid;
        gap: 20px;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .panel-header h2 {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        font-size: 1.5rem;
        color: var(--ink-strong);
      }

      .status-pill {
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 600;
        background: var(--surface-2);
        color: var(--ink-soft);
      }

      .status-pill.good {
        background: rgba(25, 167, 155, 0.15);
        color: #0b6f66;
      }

      .status-pill.bad {
        background: rgba(209, 73, 91, 0.15);
        color: #9b2030;
      }

      .camera {
        background: linear-gradient(150deg, #f8f9fb, #e8edf3);
        border-radius: var(--radius-lg);
        padding: 18px;
        display: grid;
        place-items: center;
        min-height: 320px;
        position: relative;
        overflow: hidden;
      }

      #canvas {
        width: 100%;
        max-width: 360px;
        border-radius: var(--radius-md);
        box-shadow: 0 12px 25px rgba(15, 23, 42, 0.15);
        background: #111827;
      }

      .camera .badge {
        position: absolute;
        top: 14px;
        left: 14px;
        background: rgba(15, 23, 42, 0.7);
        color: #f8fafc;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.78rem;
        letter-spacing: 0.02em;
      }

      .controls {
        display: grid;
        gap: 14px;
      }

      .controls-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      button {
        border: none;
        font-family: "Public Sans", "Segoe UI", sans-serif;
        font-weight: 600;
        padding: 12px 18px;
        border-radius: 999px;
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }

      .primary {
        background: linear-gradient(120deg, var(--accent), var(--accent-strong));
        color: #fffaf5;
        box-shadow: 0 14px 22px rgba(239, 90, 26, 0.25);
      }

      .primary:hover {
        transform: translateY(-1px) scale(1.01);
      }

      .ghost {
        background: var(--surface-2);
        color: var(--ink-strong);
      }

      .toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.95rem;
        color: var(--ink-soft);
      }

      .toggle input {
        accent-color: var(--accent);
        width: 18px;
        height: 18px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .metric-card {
        background: var(--surface-2);
        padding: 14px;
        border-radius: var(--radius-md);
        display: grid;
        gap: 6px;
      }

      .metric-label {
        font-size: 0.82rem;
        color: var(--ink-soft);
      }

      .metric-value {
        font-size: 1.15rem;
        font-weight: 600;
        color: var(--ink-strong);
      }

      .progress {
        height: 10px;
        border-radius: 999px;
        background: #dde3ea;
        overflow: hidden;
      }

      .progress > span {
        display: block;
        height: 100%;
        width: 0;
        border-radius: 999px;
        background: linear-gradient(120deg, var(--teal), #7be0d4);
        transition: width 0.2s ease;
      }

      #label-container {
        display: grid;
        gap: 6px;
        font-size: 0.9rem;
        color: var(--ink-soft);
        min-height: 64px;
      }

      .tip {
        padding: 12px 14px;
        border-radius: var(--radius-md);
        background: rgba(25, 167, 155, 0.12);
        color: #0f4f49;
        font-size: 0.92rem;
      }

      .notice {
        padding: 12px 14px;
        border-radius: var(--radius-md);
        background: rgba(15, 23, 42, 0.08);
        color: #374151;
        font-size: 0.9rem;
      }

      .alert {
        background: rgba(209, 73, 91, 0.12);
        color: #8a1a2a;
      }

      .pulse {
        animation: pulse 1.6s ease-in-out infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 90, 26, 0.35);
        }
        70% {
          box-shadow: 0 0 0 14px rgba(239, 90, 26, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 90, 26, 0);
        }
      }

      @media (max-width: 960px) {
        body {
          padding: 32px 16px 50px;
        }
        .app {
          grid-template-columns: 1fr;
        }
        .metrics {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 600px) {
        .metrics {
          grid-template-columns: 1fr;
        }
        .panel {
          padding: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <h1>Posture Pulse</h1>
        <p>
          노트북 앞에서 고개가 앞으로 빠지고 허리가 굽는 순간을 잡아냅니다. 웹캠으로
          자세를 분석하고, 거북목이 지속되면 즉시 알림을 줍니다.
        </p>
        <ul>
          <li><span>1.</span> Start 버튼으로 웹캠 활성화</li>
          <li><span>2.</span> 현재 자세가 라벨로 표시</li>
          <li><span>3.</span> 나쁜 자세가 지속되면 진동처럼 강조</li>
        </ul>
        <div class="tip" id="tip-box">카메라 앞에 앉으면 3초 안에 자세가 판단돼요.</div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>실시간 자세 체크</h2>
          <div class="status-pill" id="status-pill">대기 중</div>
        </div>

        <div class="camera">
          <span class="badge" id="session-badge">Session: -</span>
          <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
          <div class="controls-row">
            <button class="primary" id="start-btn" type="button">Start</button>
            <button class="ghost" id="reset-btn" type="button">Reset</button>
            <label class="toggle">
              <input type="checkbox" id="sound-toggle" checked />
              소리 알림
            </label>
            <label class="toggle">
              <input type="checkbox" id="wake-toggle" checked />
              화면 켜짐 유지
            </label>
          </div>

          <div class="metrics">
            <div class="metric-card">
              <div class="metric-label">현재 자세</div>
              <div class="metric-value" id="current-label">-</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">자세 집중도</div>
              <div class="metric-value" id="confidence">0%</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">나쁜 자세 지속</div>
              <div class="metric-value" id="bad-duration">0s</div>
            </div>
          </div>

          <div class="progress"><span id="score-bar"></span></div>
          <div class="notice" id="bg-notice">
            앱 모드로 열면 화면 전환에도 계속 동작합니다.
          </div>
          <div id="label-container"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script>
      const URL = "https://teachablemachine.withgoogle.com/models/YLyy1SSxu/";
      let model, webcam, ctx, labelContainer, maxPredictions;
      let isRunning = false;
      let badStart = null;
      let goodStart = null;
      let sessionStart = null;
      let frameCount = 0;
      let audioContext = null;
      let alarmActive = false;
      let alarmOscillator = null;
      let alarmGain = null;
      let wakeLock = null;
      let pausedByVisibility = false;

      const startBtn = document.getElementById("start-btn");
      const resetBtn = document.getElementById("reset-btn");
      const statusPill = document.getElementById("status-pill");
      const currentLabelEl = document.getElementById("current-label");
      const confidenceEl = document.getElementById("confidence");
      const badDurationEl = document.getElementById("bad-duration");
      const scoreBar = document.getElementById("score-bar");
      const tipBox = document.getElementById("tip-box");
      const sessionBadge = document.getElementById("session-badge");
      const soundToggle = document.getElementById("sound-toggle");
      const wakeToggle = document.getElementById("wake-toggle");
      const bgNotice = document.getElementById("bg-notice");

      const badKeywords = ["bad", "slouch", "turtle", "forward", "poor", "rounded", "neck"];
      const goodKeywords = ["good", "correct", "straight", "upright", "proper"];
      const badLabels = ["거북목", "허리굽음", "허리 굽음", "굽은 허리", "굽음", "고개 앞으로"];
      const goodLabels = ["바른 자세", "바른자세", "정자세", "올바른", "바른"];
      const BAD_THRESHOLD = 70;
      const ALERT_SECONDS = 2;
      const RECOVERY_SECONDS = 1;

      startBtn.addEventListener("click", () => {
        if (!isRunning) {
          if (model && webcam) {
            resumeSession();
          } else {
            init();
          }
        }
        unlockAudio();
      });

      soundToggle.addEventListener("change", () => {
        if (soundToggle.checked) {
          unlockAudio();
          if (alarmActive) {
            startAlarm();
          }
        } else {
          stopAlarm();
        }
      });

      wakeToggle.addEventListener("change", () => {
        if (wakeToggle.checked) {
          requestWakeLock();
        } else {
          releaseWakeLock();
        }
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          if (isRunning) {
            pausedByVisibility = true;
            pauseSession();
          }
          releaseWakeLock();
          bgNotice.textContent = "탭이 숨겨져 분석이 일시 중지되었습니다.";
        } else {
          bgNotice.textContent = "앱 모드로 열면 화면 전환에도 계속 동작합니다.";
          if (pausedByVisibility) {
            pausedByVisibility = false;
            resumeSession();
          }
          requestWakeLock();
        }
      });

      resetBtn.addEventListener("click", () => {
        if (webcam) {
          webcam.stop();
        }
        isRunning = false;
        badStart = null;
        goodStart = null;
        sessionStart = null;
        frameCount = 0;
        stopAlarm();
        pausedByVisibility = false;
        releaseWakeLock();
        statusPill.textContent = "대기 중";
        statusPill.className = "status-pill";
        currentLabelEl.textContent = "-";
        confidenceEl.textContent = "0%";
        badDurationEl.textContent = "0s";
        scoreBar.style.width = "0%";
        sessionBadge.textContent = "Session: -";
        tipBox.textContent = "카메라 앞에 앉으면 3초 안에 자세가 판단돼요.";
      });

      async function init() {
        try {
          const modelURL = URL + "model.json";
          const metadataURL = URL + "metadata.json";

          model = await tmPose.load(modelURL, metadataURL);
          maxPredictions = model.getTotalClasses();

          const size = 320;
          const flip = true;
          webcam = new tmPose.Webcam(size, size, flip);
          await webcam.setup();
          await webcam.play();
          window.requestAnimationFrame(loop);

          const canvas = document.getElementById("canvas");
          canvas.width = size;
          canvas.height = size;
          ctx = canvas.getContext("2d");
          labelContainer = document.getElementById("label-container");
          labelContainer.innerHTML = "";
          for (let i = 0; i < maxPredictions; i += 1) {
            labelContainer.appendChild(document.createElement("div"));
          }

          isRunning = true;
          sessionStart = Date.now();
          frameCount = 0;
          startBtn.textContent = "Running";
          startBtn.classList.add("pulse");
          statusPill.textContent = "분석 중";
          statusPill.className = "status-pill";
          tipBox.textContent = "머리와 어깨가 보이도록 앉아 주세요.";
          sessionBadge.textContent = "Session: LIVE";
          requestWakeLock();
        } catch (error) {
          statusPill.textContent = "카메라 오류";
          statusPill.className = "status-pill bad";
          tipBox.textContent = "카메라 권한을 확인해 주세요.";
        }
      }

      async function pauseSession() {
        isRunning = false;
        stopAlarm();
        badStart = null;
        goodStart = null;
        if (webcam) {
          webcam.stop();
        }
        startBtn.textContent = "Paused";
        startBtn.classList.remove("pulse");
        statusPill.textContent = "탭 숨김";
        statusPill.className = "status-pill";
        tipBox.textContent = "앱 모드로 열면 계속 동작합니다.";
      }

      async function resumeSession() {
        if (!model || !webcam) {
          await init();
          return;
        }
        try {
          await webcam.play();
        } catch (error) {
          await webcam.setup();
          await webcam.play();
        }
        isRunning = true;
        window.requestAnimationFrame(loop);
        startBtn.textContent = "Running";
        startBtn.classList.add("pulse");
        statusPill.textContent = "분석 중";
        statusPill.className = "status-pill";
        tipBox.textContent = "머리와 어깨가 보이도록 앉아 주세요.";
        requestWakeLock();
      }

      async function loop() {
        if (!webcam || !isRunning) {
          return;
        }
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
      }

      async function predict() {
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        const prediction = await model.predict(posenetOutput);
        frameCount += 1;

        let top = prediction[0];
        for (let i = 1; i < maxPredictions; i += 1) {
          if (prediction[i].probability > top.probability) {
            top = prediction[i];
          }
        }

        for (let i = 0; i < maxPredictions; i += 1) {
          const classPrediction =
            prediction[i].className + ": " + prediction[i].probability.toFixed(2);
          labelContainer.childNodes[i].innerHTML = classPrediction;
        }

        const confidence = Math.round(top.probability * 100);
        currentLabelEl.textContent = top.className;
        confidenceEl.textContent = `${confidence}%`;
        scoreBar.style.width = `${Math.min(100, confidence)}%`;

        const labelLower = top.className.toLowerCase();
        const isGood =
          goodKeywords.some((word) => labelLower.includes(word)) ||
          goodLabels.some((word) => top.className.includes(word));
        const isBad =
          badKeywords.some((word) => labelLower.includes(word)) ||
          badLabels.some((word) => top.className.includes(word));

        updateStatus(isGood, isBad, confidence);
        drawPose(pose);
      }

      function updateStatus(isGood, isBad, confidence) {
        const now = Date.now();
        const sessionSeconds = sessionStart ? Math.floor((now - sessionStart) / 1000) : 0;
        if (sessionStart) {
          sessionBadge.textContent = `Session: ${sessionSeconds}s`;
        }

        const isBadConfirmed = isBad && confidence >= BAD_THRESHOLD;

        if (isBadConfirmed) {
          if (!badStart) {
            badStart = now;
          }
          const badSeconds = Math.floor((now - badStart) / 1000);
          badDurationEl.textContent = `${badSeconds}s`;
          statusPill.textContent = "거북목 의심";
          statusPill.className = "status-pill bad";
          tipBox.textContent = "턱을 당기고, 어깨를 살짝 뒤로 보내 보세요.";
          tipBox.classList.add("alert");
          goodStart = null;

          if (badSeconds >= ALERT_SECONDS) {
            triggerAlert();
          }
        } else {
          badStart = null;
          badDurationEl.textContent = "0s";
          if (isGood) {
            statusPill.textContent = "바른 자세";
            statusPill.className = "status-pill good";
            tipBox.textContent = "좋아요! 시선을 화면 상단으로 유지해요.";
          } else {
            statusPill.textContent = "분석 중";
            statusPill.className = "status-pill";
            tipBox.textContent = "정면을 바라보고 천천히 호흡해요.";
          }
          tipBox.classList.remove("alert");

          if (alarmActive) {
            if (!goodStart) {
              goodStart = now;
            }
            const goodSeconds = (now - goodStart) / 1000;
            if (goodSeconds >= RECOVERY_SECONDS) {
              stopAlarm();
            }
          } else {
            goodStart = null;
          }
        }
      }

      function unlockAudio() {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === "suspended") {
          audioContext.resume();
        }
      }

      async function requestWakeLock() {
        if (!wakeToggle.checked) {
          return;
        }
        if (!("wakeLock" in navigator)) {
          bgNotice.textContent = "이 브라우저는 화면 유지 기능을 지원하지 않습니다.";
          return;
        }
        try {
          wakeLock = await navigator.wakeLock.request("screen");
          wakeLock.addEventListener("release", () => {
            wakeLock = null;
          });
        } catch (error) {
          bgNotice.textContent = "화면 유지 권한을 얻지 못했습니다.";
        }
      }

      function releaseWakeLock() {
        if (wakeLock) {
          wakeLock.release();
          wakeLock = null;
        }
      }

      function startAlarm() {
        if (!soundToggle.checked) {
          return;
        }
        if (!audioContext || audioContext.state !== "running") {
          return;
        }
        if (alarmOscillator) {
          return;
        }
        alarmActive = true;
        alarmOscillator = audioContext.createOscillator();
        alarmGain = audioContext.createGain();
        alarmOscillator.type = "sine";
        alarmOscillator.frequency.value = 640;
        alarmGain.gain.value = 0.18;
        alarmOscillator.connect(alarmGain);
        alarmGain.connect(audioContext.destination);
        alarmOscillator.start();
      }

      function stopAlarm() {
        if (alarmOscillator) {
          alarmOscillator.stop();
          alarmOscillator.disconnect();
        }
        if (alarmGain) {
          alarmGain.disconnect();
        }
        alarmOscillator = null;
        alarmGain = null;
        alarmActive = false;
      }

      function triggerAlert() {
        const wasActive = alarmActive;
        startAlarm();
        if (!wasActive) {
          if (navigator.vibrate) {
            navigator.vibrate([160, 80, 160]);
          }
          tipBox.classList.add("pulse");
          setTimeout(() => {
            tipBox.classList.remove("pulse");
          }, 600);
        }
      }

      window.addEventListener("load", () => {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("sw.js");
        }
      });

      function drawPose(pose) {
        if (webcam.canvas) {
          ctx.drawImage(webcam.canvas, 0, 0);
          if (pose) {
            const minPartConfidence = 0.5;
            tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
            tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
          }
        }
      }
    </script>
